name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages for pygame/OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libasound2

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: MyPy
        run: mypy

      - name: Pytest
        run: pytest
