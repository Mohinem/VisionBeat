[camera]
device_index = 0
width = 1280
height = 720
fps = 30
mirror = true
window_name = "VisionBeat"

[tracker]
model_complexity = 1
min_detection_confidence = 0.55
min_tracking_confidence = 0.55
enable_segmentation = false

[gestures.thresholds]
punch_forward_delta_z = 0.006
punch_max_vertical_drift = 0.75
strike_down_delta_y = 0.15
strike_max_depth_drift = 0.1
min_velocity = 0.75
candidate_ratio = 0.7
axis_dominance_ratio = 1.7

[gestures.cooldowns]
trigger_seconds = 0.2
analysis_window_seconds = 0.18
confirmation_window_seconds = 0.12

[gestures]
history_size = 6
active_hand = "right"

[audio]
backend = "pygame"
sample_rate = 44100
buffer_size = 256
output_channels = 2
simultaneous_voices = 16
output_device_name = ""
volume = 0.9

[audio.sample_mapping]
kick = "assets/samples/kick.wav"
snare = "assets/samples/snare.wav"

[transport]
backend = "none"
host = "127.0.0.1"
port = 9000
source = "visionbeat"

[debug.overlays]
draw_landmarks = true
draw_velocity_vectors = true
show_debug_panel = true

[logging]
level = "INFO"
format = "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
structured = true
event_log_path = ""
event_log_format = "jsonl"
