[camera]
device_index = 0
width = 1280
height = 720
fps = 30
mirror = true
window_name = "VisionBeat"

[tracker]
backend = "mediapipe"
model_complexity = 0
max_input_width = 640
min_detection_confidence = 0.55
min_tracking_confidence = 0.55
enable_segmentation = false

[gestures.thresholds]
punch_forward_delta_z = 0.006
punch_max_vertical_drift = 0.75
strike_down_delta_y = 0.06
strike_confirmation_ratio = 0.40
strike_max_depth_drift = 0.24
snare_collision_distance = 0.26
snare_confirmation_velocity_ratio = 0.8
snare_collision_max_depth_gap = 0.24
min_velocity = 0.37
candidate_ratio = 0.6
axis_dominance_ratio = 1.0

[gestures.cooldowns]
trigger_seconds = 0.2
analysis_window_seconds = 0.18
confirmation_window_seconds = 0.12

[gestures]
history_size = 6
active_hand = "right"
velocity_smoothing_alpha = 0.8
rearm_threshold_ratio = 0.45

[audio]
backend = "pygame"
sample_rate = 44100
buffer_size = 256
output_channels = 2
simultaneous_voices = 16
output_device_name = ""
volume = 0.9

[audio.sample_mapping]
kick = "assets/samples/kick.wav"
snare = "assets/samples/snare.wav"

[transport]
backend = "none"
host = "127.0.0.1"
port = 9000
source = "visionbeat"

[debug.overlays]
draw_landmarks = true
draw_velocity_vectors = true
show_landmark_labels = true
show_debug_panel = true
show_trigger_flash = true

[logging]
level = "INFO"
format = "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
structured = true
event_log_path = ""
event_log_format = "jsonl"
session_recording_path = ""
session_recording_mode = "tracker_outputs"

[predictive]
# disabled = heuristics only
# shadow = heuristics drive audio, predictive CNN+decoder logs passively
# primary = predictive CNN+decoder drives audio
# hybrid = predictive arms the gesture, heuristic completion fires audio
mode = "disabled"
timing_checkpoint_path = ""
gesture_checkpoint_path = ""
threshold = 0.6
trigger_cooldown_frames = 6
trigger_max_gap_frames = 1
device = "auto"
# Repetition-based prediction is available but disabled by default.
# Modes: shadow logs only, arm_only arms hybrid completion, direct may trigger audio.
rhythm_prediction_enabled = false
rhythm_min_hits = 3
rhythm_jitter_tolerance = 0.18
rhythm_min_interval_seconds = 0.25
rhythm_max_interval_seconds = 2.0
rhythm_max_horizon_seconds = 2.0
rhythm_expiry_ratio = 1.75
rhythm_confidence_threshold = 0.70
rhythm_match_tolerance_seconds = 0.12
rhythm_trigger_mode = "shadow"
