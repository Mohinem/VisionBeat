camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30
  mirror: true
  window_name: VisionBeat

tracker:
  # Gesture detection consumes TrackerOutput, so backends only need to map
  # their native keypoints into the shared landmark names.
  backend: mediapipe
  model_complexity: 1
  min_detection_confidence: 0.55
  min_tracking_confidence: 0.55
  enable_segmentation: false

gestures:
  thresholds:
    # Ultra-permissive defaults for live demo use with natural inward side-jab kick motions.
    # This legacy-named key now controls the inward-jab travel needed for kick detection.
    punch_forward_delta_z: 0.006
    punch_max_vertical_drift: 0.75
    strike_down_delta_y: 0.15
    strike_max_depth_drift: 0.18
    min_velocity: 0.39
    candidate_ratio: 0.6
    axis_dominance_ratio: 1.2
  cooldowns:
    trigger_seconds: 0.2
    analysis_window_seconds: 0.24
    confirmation_window_seconds: 0.18
  history_size: 6
  active_hand: right
  velocity_smoothing_alpha: 0.55
  rearm_threshold_ratio: 0.45

audio:
  backend: pygame
  sample_rate: 44100
  buffer_size: 256
  output_channels: 2
  simultaneous_voices: 16
  output_device_name: null
  volume: 0.9
  sample_mapping:
    kick: assets/samples/kick.wav
    snare: assets/samples/snare.wav

transport:
  backend: none
  host: 127.0.0.1
  port: 9000
  source: visionbeat

debug:
  overlays:
    draw_landmarks: true
    draw_velocity_vectors: true
    show_debug_panel: true

logging:
  level: INFO
  format: '%(asctime)s | %(levelname)s | %(name)s | %(message)s'
  structured: true
  event_log_path: null
  event_log_format: jsonl
